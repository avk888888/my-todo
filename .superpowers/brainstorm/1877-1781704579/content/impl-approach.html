<h2>技術實作方式</h2>
<p class="subtitle">拖曳功能的實作方法，你偏好哪種？</p>

<div class="options">
  <div class="option" data-choice="native" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>原生 HTML5 Drag & Drop</h3>
      <p>使用瀏覽器內建的拖曳 API，不需安裝任何套件</p>
      <div class="pros-cons" style="margin-top:0.5rem">
        <div class="pros"><h4>優點</h4><ul>
          <li>零依賴，不增加 bundle 大小</li>
          <li>實現簡單</li>
        </ul></div>
        <div class="cons"><h4>缺點</h4><ul>
          <li>行動裝置支援較差</li>
          <li>拖曳動畫較不流暢</li>
        </ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="dndkit" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>@dnd-kit 套件（推薦）</h3>
      <p>專業拖曳排序套件，支援流暢動畫與觸控</p>
      <div class="pros-cons" style="margin-top:0.5rem">
        <div class="pros"><h4>優點</h4><ul>
          <li>流暢的拖曳動畫與視覺回饋</li>
          <li>支援觸控/行動裝置</li>
          <li>無障礙支援</li>
          <li>React 原生設計</li>
        </ul></div>
        <div class="cons"><h4>缺點</h4><ul>
          <li>需安裝套件 (~30KB gzip)</li>
        </ul></div>
      </div>
    </div>
  </div>
</div>
