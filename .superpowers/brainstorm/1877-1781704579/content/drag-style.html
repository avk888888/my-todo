<h2>拖曳操作的方式</h2>
<p class="subtitle">用滑鼠左鍵拖曳來重新排列順序，你偏好哪種設計？</p>

<div class="options">
  <div class="option" data-choice="handle" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>⠿ 拖曳把手</h3>
      <p>每個項目左側有把手圖示，按住把手才能拖曳</p>
      <div class="mockup" style="margin-top:0.5rem">
        <div class="mockup-body" style="padding:8px">
          <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;margin-bottom:4px;background:#f9f9f9">
            <span style="cursor:grab;color:#ccc;font-size:1.2rem">⠿</span>
            <span>☐ 買牛奶</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;margin-bottom:4px">
            <span style="cursor:grab;color:#ccc;font-size:1.2rem">⠿</span>
            <span>☐ 打電話給媽媽</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;background:#f9f9f9">
            <span style="cursor:grab;color:#ccc;font-size:1.2rem">⠿</span>
            <span>☑️ 完成報告</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="whole" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>整列拖曳</h3>
      <p>按住項目任何位置都可拖曳</p>
      <div class="mockup" style="margin-top:0.5rem">
        <div class="mockup-body" style="padding:8px">
          <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;margin-bottom:4px;background:#f0f8ff;cursor:grab">
            <span>☐ 買牛奶</span>
            <span style="margin-left:auto;color:#ccc;font-size:0.75rem">↕</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;margin-bottom:4px;cursor:grab">
            <span>☐ 打電話給媽媽</span>
            <span style="margin-left:auto;color:#ccc;font-size:0.75rem">↕</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px;cursor:grab;background:#f0f8ff">
            <span>☑️ 完成報告</span>
            <span style="margin-left:auto;color:#ccc;font-size:0.75rem">↕</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
