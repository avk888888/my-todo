<h2>記事本要怎麼運作？</h2>
<p class="subtitle">在 Todo 下方的記事區域，你偏好哪種操作方式？</p>

<div class="options">
  <div class="option" data-choice="scratchpad" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>📄 自由記錄區</h3>
      <div class="mockup" style="margin-top:0.5rem">
        <div class="mockup-body" style="padding:8px;min-height:100px">
          <div style="border:1px solid #ddd;border-radius:4px;padding:8px;min-height:60px;font-size:0.75rem;color:#999">
            隨時打字記錄，自動儲存...<br/><br/>
            <span style="color:#666">像一個永遠開啟的記事本</span>
          </div>
          <div style="font-size:0.65rem;color:#999;margin-top:4px">最後編輯：剛剛 · 自動儲存</div>
        </div>
      </div>
      <p style="font-size:0.8rem;color:#666;margin-top:0.25rem">單一超大文字區，打完自動存，打開就能繼續寫</p>
    </div>
  </div>

  <div class="option" data-choice="multi" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>📝 多則記事列表</h3>
      <div class="mockup" style="margin-top:0.5rem">
        <div class="mockup-body" style="padding:8px;min-height:120px">
          <div style="display:flex;margin-bottom:6px">
            <input class="mock-input" placeholder="新記事標題..." style="flex:1;font-size:0.7rem">
            <button class="mock-button" style="font-size:0.7rem;padding:2px 8px">＋</button>
          </div>
          <div style="background:#f5f5f5;border-radius:4px;padding:6px;font-size:0.7rem;margin-bottom:4px">
            <strong>會議重點</strong> <span style="color:#999;float:right">10:30</span>
          </div>
          <div style="background:#f5f5f5;border-radius:4px;padding:6px;font-size:0.7rem;margin-bottom:4px">
            <strong>購物清單</strong> <span style="color:#999;float:right">昨天</span>
          </div>
          <div style="background:#e3f2fd;border-radius:4px;padding:6px;font-size:0.7rem">
            <strong>靈感筆記</strong> <span style="color:#999;float:right">週一</span>
          </div>
        </div>
      </div>
      <p style="font-size:0.8rem;color:#666;margin-top:0.25rem">像手機備忘錄，多則記事各自有標題+內容</p>
    </div>
  </div>
</div>
