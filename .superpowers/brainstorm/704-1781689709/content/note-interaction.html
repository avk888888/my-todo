<h2>記事怎麼操作？</h2>
<p class="subtitle">在 Todo 下方的記事區域，操作流程要怎麼設計？</p>

<div class="cards">
  <div class="card" data-choice="inline" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fef7e0;padding:12px;border-radius:8px;font-size:0.75rem">
        <div style="display:flex;margin-bottom:8px">
          <input placeholder="新記事標題..." style="flex:1;border:1px solid #ddd;border-radius:4px;padding:6px;font-size:0.75rem">
          <button style="background:#4a90d9;color:white;border:none;border-radius:4px;padding:6px 12px;margin-left:4px;font-size:0.75rem">＋</button>
        </div>
        <div style="background:white;border-radius:6px;padding:8px;margin-bottom:6px">
          <strong>📝 會議重點</strong>
          <span style="display:block;color:#666;margin-top:4px;font-size:0.7rem">下午2點與設計團隊開會...</span>
          <div style="font-size:0.6rem;color:#999;margin-top:4px">10:30 · <span style="color:#e74c3c">🗑️</span></div>
        </div>
        <div style="background:white;border-radius:6px;padding:8px;">
          <strong>📝 購物清單</strong>
          <span style="display:block;color:#666;margin-top:4px;font-size:0.7rem">牛奶、蛋、麵包...</span>
          <div style="font-size:0.6rem;color:#999;margin-top:4px">昨天 · <span style="color:#e74c3c">🗑️</span></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 列表 + 展開編輯</h3>
      <p>記事列表顯示標題+預覽，點擊展開編輯完整內容</p>
    </div>
  </div>

  <div class="card" data-choice="modal" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fef7e0;padding:12px;border-radius:8px;font-size:0.75rem">
        <div style="display:flex;margin-bottom:8px">
          <input placeholder="新記事標題..." style="flex:1;border:1px solid #ddd;border-radius:4px;padding:6px;font-size:0.75rem">
          <button style="background:#4a90d9;color:white;border:none;border-radius:4px;padding:6px 12px;margin-left:4px;font-size:0.75rem">＋</button>
        </div>
        <div style="background:white;border-radius:6px;padding:8px;margin-bottom:6px">
          <strong>📝 會議重點</strong><span style="float:right;font-size:0.6rem;color:#999">10:30</span>
          <span style="display:block;color:#666;margin-top:4px;font-size:0.7rem">下午2點與設計團隊開會...</span>
        </div>
        <div style="background:white;border-radius:6px;padding:8px;">
          <strong>📝 購物清單</strong><span style="float:right;font-size:0.6rem;color:#999">昨天</span>
          <span style="display:block;color:#666;margin-top:4px;font-size:0.7rem">牛奶、蛋、麵包...</span>
        </div>
        <div style="position:absolute;top:25%;left:10%;right:10%;background:white;border-radius:8px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);border:2px solid #f0a030">
          <strong>✏️ 編輯記事</strong><span style="float:right;color:#999">✕</span>
          <input value="會議重點" style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;margin:8px 0;font-size:0.7rem">
          <textarea style="width:100%;border:1px solid #ddd;border-radius:4px;padding:6px;min-height:40px;font-size:0.7rem" placeholder="內容...">下午2點與設計團隊開會討論新功能</textarea>
          <button style="background:#4a90d9;color:white;border:none;border-radius:4px;padding:4px 12px;font-size:0.7rem">儲存</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 列表 + 彈窗編輯</h3>
      <p>記事列表顯示預覽，點擊跳出編輯對話框修改</p>
    </div>
  </div>
</div>
